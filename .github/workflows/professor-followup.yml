name: professor-followup

# Runs daily and sends follow-ups to professors who haven't replied yet.
# Also runnable on demand from the Actions tab (with an optional dry-run toggle).
on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC every day
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, send nothing)"
        type: boolean
        default: true

jobs:
  followup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Send follow-ups
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          # On scheduled runs, DRY_RUN is unset so config.json decides.
          # On manual runs, the checkbox above wins.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '' }}
        run: node followup.js
