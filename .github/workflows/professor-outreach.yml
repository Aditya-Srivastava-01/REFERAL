name: professor-outreach

# Runs every 4 hours on weekdays — 6 batches/day, 20 emails per batch ≈ 120/day.
# Spreading sends looks organic to spam filters and hits MIT/Oxford/ETH morning inboxes.
# The ledger prevents any professor from ever being contacted twice across runs.
on:
  schedule:
    - cron: "0 */4 * * 1-5" # every 4 hours, Mon–Fri UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate + log only, send nothing)"
        type: boolean
        default: true

permissions:
  contents: write # to commit outreach-ledger.json back

concurrency:
  group: professor-outreach
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Send outreach emails
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          # Scheduled runs: DRY_RUN unset, outreach-config.json decides.
          # Manual runs: the checkbox above wins.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '' }}
        run: node outreach.js

      - name: Commit updated ledger
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outreach-ledger.json
          if ! git diff --cached --quiet; then
            git commit -m "outreach: update ledger"
            git push
          fi
