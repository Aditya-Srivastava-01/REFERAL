name: professor-outreach

# Sends the daily batch of personalized first-contact emails and commits the
# updated ledger back, so the same professor is never contacted twice.
# Also runnable on demand from the Actions tab (with a dry-run toggle).
on:
  schedule:
    - cron: "30 13 * * 1-5" # 13:30 UTC, weekdays (morning in US/EU inboxes)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate + log only, send nothing)"
        type: boolean
        default: true

permissions:
  contents: write # to commit outreach-ledger.json back

concurrency:
  group: professor-outreach
  cancel-in-progress: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Send outreach emails
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          # Scheduled runs: DRY_RUN unset, outreach-config.json decides.
          # Manual runs: the checkbox above wins.
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '' }}
        run: node outreach.js

      - name: Commit updated ledger
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outreach-ledger.json
          if ! git diff --cached --quiet; then
            git commit -m "outreach: update ledger"
            git push
          fi
